<!-- switch control statement -->
<script>
    var day = "Sunday";
    switch(day){
        case "Sunday": document.write("<br>Sunday"); break; 
        case "Sunday": document.write("<br>Sunday Another Day"); break; 
        case "Monday" : document.write("<br>Monday"); break; 
        case "Tuesday" : document.write("<br>Tuesday"); break; 
        case "Wednesday" : document.write("<br>Wednesday"); break; 
        case "Thursday" : document.write("<br>Thursday"); break; 
        case "Friday" : document.write("<br>Friday"); break; 
        case "Saturday" : document.write("<br>Saturday"); break; 
        default : document.write("<br>Invalid day"); break; 
    }
</script>
