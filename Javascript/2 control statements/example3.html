<script>
var a = 1;
var b = 3;
var c = 7;
var avg = (a+b+c)/3;
document.write("<br>average : "+avg);
document.write("<br>average : "+avg.toPrecision(3));
document.write("<br>average : "+avg.toFixed(3));

document.write("<br><br>floor : "+Math.floor(3));
document.write("<br>floor : "+Math.floor(3.4));
document.write("<br>floor : "+Math.floor(3.8));
document.write("<br>floor : "+Math.floor(-3.4));
document.write("<br>floor : "+Math.floor(-3.9));

document.write("<br><br>ceil : "+Math.ceil(3));
document.write("<br>ceil : "+Math.ceil(3.4));
document.write("<br>ceil : "+Math.ceil(3.8));
document.write("<br>ceil : "+Math.ceil(-3.4));
document.write("<br>ceil : "+Math.ceil(-3.9));

document.write("<br><br>random : "+Math.ceil((Math.random()*10000).toFixed(4)));

</script>
