<!-- switch control statement -->
<script>
    var day = 3;
    switch(day){
        case 1 : document.write("<br>Sunday"); break; 
        case 2 : document.write("<br>Monday"); break; 
        case 3 : document.write("<br>Tuesday"); break; 
        case 4 : document.write("<br>Wednesday"); break; 
        case 5 : document.write("<br>Thursday"); break; 
        case 6 : document.write("<br>Friday"); break; 
        case 7 : document.write("<br>Saturday"); break; 
        default : document.write("<br>Invalid day"); break; 
    }
</script>
