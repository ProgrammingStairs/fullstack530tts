<script>
    //  Type coersion
    // 1. Number to string 
    // 2. String to Number
    // 3. Boolean to Number 
    // 4. Equality

    // Number to string
    var a = "100"+5
    document.write("<br>a : "+a);

    // String to Number
    var a = "100"-5
    document.write("<br>a : "+a);

    // Boolean to Number
    var a = 100+true-false-true;
    document.write("<br>a : "+a);

    // Equality
    var a = null==0;
    document.write("<br>a : "+a);

    var a = null==undefined;
    document.write("<br>a : "+a);

    var a = null==false;
    document.write("<br>a : "+a);

    var a = null>=0;
    document.write("<br>a : "+a);

</script>
