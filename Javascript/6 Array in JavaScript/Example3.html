<script>
    var arr = [1,2,3,4,5,6,7];
    document.write("<br>Array elements are : "+arr);
    arr.push(100);
    document.write("<br>push : "+arr);
    arr.push(1000,2000);
    document.write("<br>push : "+arr);
    arr.unshift(100);
    document.write("<br>unshift : "+arr);
    arr.unshift(1000,2000);
    document.write("<br>unshift : "+arr);
    document.write("<br>pop : "+arr.pop());
    document.write("<br>arr : "+arr);
    document.write("<br>shift : "+arr.shift());
    document.write("<br>arr : "+arr);
</script>
