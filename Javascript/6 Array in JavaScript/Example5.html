<script>
    var arr = [12,23,34,45,56,67,99]
    document.write("Array elements are : "+arr);
    arr.splice(3,0,1000);
    document.write("<br>Array elements are : "+arr);
    arr.splice(2,1);
    document.write("<br>Array elements are : "+arr);
    arr.splice(3,2,"red","green");
    document.write("<br>Array elements are : "+arr);
    document.write("<br>Array elements are : "+arr.slice(2,5));
    document.write("<br>Array elements are : "+arr.join("-"));
    document.write("<br>Array elements are : "+arr.join(" "));
    
</script>
