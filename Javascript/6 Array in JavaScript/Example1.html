<!-- Array : 
    1. Array is a collection of homogenous and heterogenous data elements.
    2. In Javascript array is represented by []
    3. Type of array is object in javascript
    4. Array is non primitive data type in js
    5. Array works on the concept of indexing
    6. Prerequisite for array allocation is base address
    7. Array works on continuous memory location
    8. Array can hold primitive as well as object references
    -->

<script>
    var arr = [34,56.67, true,"Hello User",-234];
    document.write("Array elements : "+arr);
    document.write("<br>typeof(arr) : "+typeof(arr));

    document.write("<br>arr[0] : "+arr[0]);
    document.write("<br>arr[1] : "+arr[1]);
    document.write("<br>arr[2] : "+arr[2]);
    document.write("<br>arr[3] : "+arr[3]);
    document.write("<br>arr[4] : "+arr[4]);

</script>
