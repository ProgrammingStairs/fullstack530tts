<!-- Jagged array -->
<script>
var r = parseInt(prompt("Enter rows : "));
var arr = []
for(i=0;i<r;i++){
    var c = parseInt(prompt("Enter columns for "+(i+1)+" row : "));
    arr[i] = []
    for(j=0;j<c;j++){
        arr[i][j] = parseInt(prompt("Enter elements : "));
    }
}
document.write("<br>Array elements are : <br>");
for(i=0;i<r;i++){
    for(j=0;j<arr[i].length;j++){
        document.write(arr[i][j]+"&nbsp;&nbsp;&nbsp;");
    }
    document.write("<br>");
} 

</script>
