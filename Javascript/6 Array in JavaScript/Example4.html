<script>
    var arr = [31,192,23,49,50,6,27];
    document.write("<br>Array elements are : "+arr);
    document.write("<br>minimum element : ",Math.min(...arr));    
    document.write("<br>maximum element : ",Math.max(...arr));    
    document.write("<br>minimum element : ",Math.min(1,2,3,4,5,6,7));    
    document.write("<br>maximum element : ",Math.max(1,2,3,4,5,6,7));    
    document.write("<br>minimum element : ",Math.min.apply(null,arr));    
    document.write("<br>maximum element : ",Math.max.apply(null,arr));    
    document.write("<br>Sorting | Ascending : ",arr.sort((a,b)=>{
        return a-b;
    }));    
    document.write("<br>Sorting | Descending : ",arr.sort((a,b)=>{
        return b-a;
    }));    

</script>
