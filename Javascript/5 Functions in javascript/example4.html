<!-- example showing the concept of functions in javascript -->
<script>
    // variable function | anonymous function
    /*
    var addition = function(){
        var a = parseInt(prompt("Enter value of a : "));
        var b = parseInt(prompt("Enter value of b : "));
        document.write("sum : "+(a+b));
    }
    addition();
    */

    // lambda expression | fat arrow function
    
    var addition = ()=>{
        var a = parseInt(prompt("Enter value of a : "));
        var b = parseInt(prompt("Enter value of b : "));
        document.write("sum : "+(a+b));
    }
    addition();
    
</script>
