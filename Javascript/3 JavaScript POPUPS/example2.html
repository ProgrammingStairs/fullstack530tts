<!-- 
 JavaScript PopUp's : 
    There are three types of JavaScript Popup's : 
        a. alert() (window.alert())
        b. confirm() (window.confirm())
        c. prompt() (window.prompt())
-->

<script>

    var res = confirm("Do you want to continue ? ");
    // document.write("<br>res : "+res);
    if(res)
        alert("User wants to continue");
    else 
        document.write("User wants to discard request");
</script>
