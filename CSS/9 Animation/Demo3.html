<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #box{
            margin: 100px;
            height: 300px;
            width: 300px;
              border-radius: 50%;
            background-color: red;
            animation-name: myAnimate;
            animation-duration: 2s;
            animation-iteration-count: infinite;
        }
        @keyframes myAnimate {
            25%{
                background-color: whitesmoke;
                    border-radius: 50%;
            }
            50%{
                background-color: red;
                border-radius: 50%;
                height: 320px;
                width: 320px;
                box-shadow: 1px 1px 40px 1px whitesmoke;
            }
            75%{
                background-color: whitesmoke;
                    border-radius: 50%;
            }
        }
    </style>
</head>
<body>
    <div id="box"></div>
</body>
</html>
