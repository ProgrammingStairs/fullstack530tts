<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #box{
            margin: 100px;
            animation-name: myAnimate;
            animation-duration: 1s;
            font-size: 40px;
            animation-iteration-count: infinite;
        }
        @keyframes myAnimate {
            0%{color: whitesmoke;}
            20%{color: orange;}
            40%{color: red;}
            60%{color: green;}
            80%{color: purple;}
            100%{color: blue;}
        }
    </style>
</head>
<body>
    <div id="box">
        ### Sale ### | Discount | 25% off
    </div>
</body>
</html>
