<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- Latest compiled and minified CSS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/css/bootstrap.min.css" integrity="sha384-BVYiiSIFeK1dGmJRAkycuHAHRg32OmUcww7on3RYdg4Va+PmSTsz/K68vbdEjh4u" crossorigin="anonymous">

<script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>

<!-- Latest compiled and minified JavaScript -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/js/bootstrap.min.js" integrity="sha384-Tc5IQib027qvyjSMfHjOMaLkfuWVxZxUPnCJA7l2mCWNIpG9mGCD8wGNIcPD7Txa" crossorigin="anonymous"></script>
    <style>
        input,textarea,select{
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div style="width: 50%; margin: auto; border-style: solid; margin-top:10px; padding: 10px;background-color: grey;">
        <center><h3>Registration Form</h3></center>
        <form action="" class="form-group">
            <input 
                type="text"
                placeholder="Enter Username"
                name="username"
                id="username"
                class="form-control"
            >
            <input 
                type="email"
                placeholder="Enter Email"
                name="email"
                id="email"
                class="form-control"
            >
            <input 
                type="password"
                placeholder="Enter Password"
                name="password"
                id="password"
                class="form-control"
                >
            <textarea 
                placeholder="Enter Address"
                name="address"
                id="address"
                rows="3"
                class="form-control"
            ></textarea>
            <select 
                name="subject"
                id="subject"
                class="form-control"
            >
                <option value="">Select Subject</option>
                <option value="C Language">C Language</option>
                <option value="C++ Language">C++ Language</option>
                <option value="C# Language">C# Language</option>
                <option value="Java Language">Java Language</option>
            </select>
            Select Gender : <br>
            <input
                type="radio"
                name="gender"
                value="male"
                id="male"
                class="radio-inline"
            ><label for="male">&nbsp;Male</label>
            <input
                type="radio"
                name="gender"
                value="female"
                id="female"
                class="radio-inline"
            ><label for="female">&nbsp;Female</label>
            <input 
                type="file"
                name="profile"
                id="profile"
                class="form-control"
            >
            <input
                type="submit"
                value="Register"
                class="btn btn-success btn-block"
            >
            <input
                type="reset"
                value="Reset"
                class="btn btn-danger btn-block"
            >
        </form>
    </div>
</body>
</html>
